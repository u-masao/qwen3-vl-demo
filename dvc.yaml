stages:
  # ── データ生成 ─────────────────────────────────────────────────────────────
  generate_data:
    foreach:
      smoke:
        data_dir: data_smoke
        output_dir: outputs_smoke
      default:
        data_dir: data
        output_dir: outputs
    do:
      cmd: uv run python -m qwen3vl_demo.generate_data --profile ${key}
      params:
        - configs/${key}.yaml:
      deps:
        - src/qwen3vl_demo/config.py
        - src/qwen3vl_demo/generate_data.py
        - src/qwen3vl_demo/prompts.py
      outs:
        - ${item.data_dir}/train
        - ${item.data_dir}/eval

  # ── ベースライン評価 ────────────────────────────────────────────────────────
  eval_base:
    foreach:
      smoke:
        data_dir: data_smoke
        output_dir: outputs_smoke
      default:
        data_dir: data
        output_dir: outputs
    do:
      cmd: uv run python -m qwen3vl_demo.evaluate --profile ${key} --label base
      params:
        - configs/${key}.yaml:
      deps:
        - src/qwen3vl_demo/config.py
        - src/qwen3vl_demo/evaluate.py
        - src/qwen3vl_demo/models.py
        - ${item.data_dir}/eval
      metrics:
        - ${item.output_dir}/metrics_base.json:
            cache: false

  # ── 埋め込みモデルのファインチューニング ────────────────────────────────────
  train:
    foreach:
      smoke:
        data_dir: data_smoke
        output_dir: outputs_smoke
      default:
        data_dir: data
        output_dir: outputs
    do:
      cmd: uv run python -m qwen3vl_demo.train --profile ${key}
      params:
        - configs/${key}.yaml:
      deps:
        - src/qwen3vl_demo/config.py
        - src/qwen3vl_demo/evaluate.py
        - src/qwen3vl_demo/models.py
        - src/qwen3vl_demo/train.py
        - ${item.data_dir}/train
        - ${item.data_dir}/eval
      outs:
        - ${item.output_dir}/model

  # ── ファインチューニング後評価（埋め込みのみ）──────────────────────────────
  eval:
    foreach:
      smoke:
        data_dir: data_smoke
        output_dir: outputs_smoke
      default:
        data_dir: data
        output_dir: outputs
    do:
      cmd: uv run python -m qwen3vl_demo.evaluate --profile ${key} --finetuned
      params:
        - configs/${key}.yaml:
      deps:
        - src/qwen3vl_demo/config.py
        - src/qwen3vl_demo/evaluate.py
        - src/qwen3vl_demo/models.py
        - ${item.data_dir}/eval
        - ${item.output_dir}/model
      metrics:
        - ${item.output_dir}/metrics_finetuned.json:
            cache: false

  # ── リランカーのファインチューニング ────────────────────────────────────────
  # default のみ実行（smoke は reranker.model_id=null のため学習をスキップ＝出力なし）。
  # Hard Negative Mining で FT 済み埋め込みモデル（outputs/model）を使うため deps に含める。
  train_reranker:
    cmd: uv run python -m qwen3vl_demo.train_reranker --profile default
    params:
      - configs/default.yaml:
    deps:
      - src/qwen3vl_demo/config.py
      - src/qwen3vl_demo/models.py
      - src/qwen3vl_demo/train_reranker.py
      - data/train
      - outputs/model
    outs:
      - outputs/reranker

  # ── 6 パターン評価（埋め込み{base,ft} × リランカー{base,ft,none}）＋リランク事例 ──
  # base 埋め込み/リランカーは HF からダウンロード、ft はそれぞれの学習成果物を使う。
  # --num-queries 7: ペルソナが 7 種類なので全ペルソナ分の事例を出力する。
  rerank_default:
    cmd: uv run python -m qwen3vl_demo.rerank --profile default --num-queries 7
    params:
      - configs/default.yaml:
    deps:
      - src/qwen3vl_demo/config.py
      - src/qwen3vl_demo/models.py
      - src/qwen3vl_demo/rerank.py
      - data/eval
      - outputs/model
      - outputs/reranker
    outs:
      - outputs/rerank_examples.json
    metrics:
      - outputs/rerank_metrics.json:
          cache: false

  # ── smoke の配線確認用（reranker=null のためリランクはスキップ・出力なし）──
  rerank_smoke:
    cmd: uv run python -m qwen3vl_demo.rerank --profile smoke
    params:
      - configs/smoke.yaml:
    deps:
      - src/qwen3vl_demo/config.py
      - src/qwen3vl_demo/models.py
      - src/qwen3vl_demo/rerank.py
      - data_smoke/eval
      - outputs_smoke/model
