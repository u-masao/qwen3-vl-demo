# Default profile: local RTX 4060 Ti 16GB (Ada), bf16.
# This is the "real" run: FLUX.2-klein data generation + Qwen3-VL fine-tuning.
#
# This file is the source of truth for the `default` profile. To run the DVC
# pipeline with it, make it the active `params.yaml`:  `make use-default`
# (which just copies this file to params.yaml). See dvc.yaml / README for how
# each value flows into the stages' `cmd` via ${...} substitution.
common:
  profile: default
  seed: 1
  device: cuda
  dtype: bfloat16          # Ada supports bf16 natively; more stable than fp16 for training.
  paths:
    data_dir: data
    output_dir: outputs
    model_dir: outputs/model   # where the fine-tuned embedding model is saved

data:
  num_train: 500
  num_eval: 200
  image_size: 512
  # If true, images sharing the query's category also count as relevant during
  # evaluation (looser). Unused when persona-based evaluation is active.
  relevant_same_category: false
  # Data-generation task. Default "preference" = human-like preference model
  # (latent taste axes + archetype mixtures + non-additive interactions); each
  # image is labelled with its argmax-appeal persona, so the eval/train/rerank
  # pipeline is unchanged. The non-additive structure gives the reranker real
  # headroom (see docs/experiment_report_preference_gamma_sweep.md).
  # "subject" = legacy (arbitrary subject->persona map); opt-in via --task subject.
  task: preference

# Preference task knobs (only used when data.task = preference). gamma is the
# interaction strength: 0 => additive (reranker has ~no headroom, reproduces the
# old behaviour), larger => stronger non-additive structure => more reranker headroom.
preference:
  gamma: 2.0
  lam: 0.3
  sigma: 0.1
  sharpness: 2.0

image_gen:
  # FLUX.2-klein-4B (Apache-2.0) — step-distilled rectified-flow model.
  model_id: black-forest-labs/FLUX.2-klein-4B
  num_inference_steps: 4          # FLUX.2-klein is distilled to 4 steps.
  guidance_scale: 1.0             # reference setting for the 4B model.
  batch_size: 1                   # VRAM 節約のため 1 に設定（4060 Ti 16GB での安定動作優先）。
  cache_enabled: true             # 同一入力の再生成をスキップする生成画像キャッシュ
  cache_dir: .cache/imggen        # 環境ごと使い捨て（.gitignore の .cache/ 配下。VCS 非追跡）

embedding:
  model_id: Qwen/Qwen3-VL-Embedding-2B
  attn_implementation: flash_attention_2   # falls back to sdpa if unavailable
  # Cap image tokens to keep VRAM in check on a 16GB card.
  max_pixels: 200704              # 512*392 ~= keep patches modest; tune as needed
  query_prompt_name: default      # "default" prompt = "Represent the user's input." で全モデル一貫（Issue #20）

reranker:
  model_id: Qwen/Qwen3-VL-Reranker-2B
  top_k: 10                       # how many retrieved images to rerank per query
  model_dir: outputs/reranker     # where a fine-tuned reranker is saved / loaded from
  num_negatives: 3                # negatives per positive when fine-tuning the reranker
  # Cap reranker image tokens to bound activation memory on a 16GB card (mirrors
  # embedding.max_pixels). 200704 だと reranker 学習が 16GB を超え WSL2 の共有メモリへ
  # 退避して激遅化したため、100352（半分）に下げて VRAM に収める（Issue #11）。null => uncapped.
  max_pixels: 100352

train:
  epochs: 1
  # 4 だと reranker 学習で VRAM が共有メモリへ退避したため 2 に下げる（埋め込み学習と共通。
  # MNRL の負例数は減るが 16GB での安定動作を優先。Issue #11）。
  per_device_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  gradient_checkpointing: true
  eval_steps: 50
  save_steps: 10000
  logging_steps: 10

distill:
  # 知識蒸留: teacher → student（埋め込み bi-encoder）。詳細は src/qwen3vl_demo/distill.py。
  #   teacher=reranker … パターン A（cross→bi, MarginMSE）。FT 済みリランカーが teacher。
  #   teacher=oracle   … パターン B（嗖好モデルの soft label, CoSENT）。teacher はモデル不要。
  teacher: reranker
  model_dir: outputs/model_distilled   # 蒸留済み student 埋め込みの保存先
  num_negatives: 7                     # 蒸留ペアの 1 クエリあたり負例数（Issue #25: 3→7 で段階確認）
  temperature: 1.0                     # oracle soft relevance の温度（reranker では未使用）

# 蒸留先（student）を複数パターン試すためのマトリクス。dvc.yaml の distill@<name> /
# eval_distill@<name>（foreach ステージ）が読む。キー＝variant 名＝出力ディレクトリ名
# （outputs/distill_<name>）。パターンを増やすにはここへ 1 エントリ足すだけでよく、DVC は
# variant ごとに独立してキャッシュする（1 つ直しても他は再実行されない＝低コストな反復）。
#   teacher        … reranker（パターン A: cross→bi）/ oracle（パターン B: 嗖好モデル）
#   student_model  … none=ベース埋め込み / ft=FT 成果物 / 任意 ID・パス（小型へ圧縮）
#   student_kind   … bi（検索用 bi-encoder, 現状サポート）/ cross（リランカー圧縮, 今後）
#   quantize       … none（現状サポート）/ 8bit / 4bit（QLoRA 自己蒸留, 今後・GPU 限定）
distill_variants:
  self:               # ①自己蒸留: ベース埋め込みから（蒸留単体の効果を測る）
    teacher: reranker
    student_model: none
    student_kind: bi
    quantize: none
  ft_continue:        # ②FT 継続蒸留: FT 済み埋め込みを起点に蒸留する
    teacher: reranker
    student_model: ft
    student_kind: bi
    quantize: none
  oracle_base:        # ③oracle 蒸留: 嗜好モデルの soft label から（teacher モデル不要・VRAM 問題なし）
    teacher: oracle
    student_model: none
    student_kind: bi
    quantize: none
  oracle_ft:          # ④oracle 蒸留: FT 済み埋め込みを起点に（teacher モデル不要）
    teacher: oracle
    student_model: ft
    student_kind: bi
    quantize: none
  # ③小型 cross-modal 埋め込みへ圧縮する例（必要なら有効化）:
  # clip_small:
  #   teacher: reranker
  #   student_model: sentence-transformers/clip-ViT-B-32
  #   student_kind: bi
  #   quantize: none
