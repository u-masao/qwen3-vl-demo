# FLUX (fp8) profile: same as `default`, but generate data with the fp8
# checkpoint FLUX.2-klein-4b-fp8 instead of the full-precision FLUX.2-klein-4B.
#
# FLUX.2 [klein] 4B (Apache-2.0) is a step-distilled rectified-flow model. The
# fp8 checkpoint keeps VRAM low (~4 GB), so it fits comfortably on a 16GB card
# (use this preset if the full-precision default is too heavy on your GPU).
#
# Usage:
#   make use-flux        # activate this profile for the DVC pipeline (copies to params.yaml)
#   make data PROFILE=flux   # or run a single stage directly against this file
#
# Requirements / notes:
#   * Needs a recent `diffusers` with FLUX.2 (Flux2) support — upgrade if needed.
#   * `black-forest-labs/FLUX.2-klein-4b-fp8` ships a single-file checkpoint; if
#     AutoPipelineForText2Image can't load it in your diffusers version, use the
#     diffusers-format mirror `Photoroom/FLUX.2-klein-4b-fp8-diffusers` (or the
#     base repo `black-forest-labs/FLUX.2-klein-4B`).
#   * Paths match the `default` profile (data/ and outputs/), so FLUX-generated
#     data is a drop-in replacement for the rest of the pipeline.
common:
  profile: flux
  seed: 42
  device: cuda
  dtype: bfloat16
  paths:
    data_dir: data
    output_dir: outputs
    model_dir: outputs/model

data:
  num_train: 200
  num_eval: 50
  image_size: 512
  relevant_same_category: false
  task: subject            # "subject"(legacy) | "preference"(human-like preference model)

# Preference task knobs (used only when data.task = preference). gamma = interaction strength.
preference:
  gamma: 2.0
  lam: 0.3
  sigma: 0.1
  sharpness: 2.0

image_gen:
  model_id: black-forest-labs/FLUX.2-klein-4b-fp8
  num_inference_steps: 4          # FLUX.2-klein is step-distilled to 4 steps.
  guidance_scale: 1.0             # reference setting for the 4B model.
  batch_size: 4                   # fp8 keeps VRAM low, so a larger batch than the default (1) fits.
  cache_enabled: true             # 同一入力の再生成をスキップする生成画像キャッシュ
  cache_dir: .cache/imggen        # 環境ごと使い捨て（.gitignore の .cache/ 配下。VCS 非追跡）

embedding:
  model_id: Qwen/Qwen3-VL-Embedding-2B
  attn_implementation: flash_attention_2
  max_pixels: 200704
  query_prompt_name: query

reranker:
  model_id: Qwen/Qwen3-VL-Reranker-2B
  top_k: 10
  model_dir: outputs/reranker
  num_negatives: 3
  max_pixels: 200704              # cap reranker image tokens at eval time (VRAM; Issue #11)

train:
  epochs: 1
  per_device_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  gradient_checkpointing: true
  eval_steps: 50
  save_steps: 50
  logging_steps: 10
